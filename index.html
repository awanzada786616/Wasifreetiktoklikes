<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasi Free Likes</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-weight: 600; margin-bottom: 10px; letter-spacing: 2px; color: #00f2fe; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        input:focus { border-color: #00f2fe; background: rgba(255, 255, 255, 0.2); }

        .btn-order {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-order:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }

        /* Tracking Section */
        .tracking-card {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-track { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; margin-top: 10px; width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; }
        
        #statusDisplay { margin-top: 15px; font-weight: bold; font-size: 18px; }
        .pending { color: #ffd32a; }
        .processing { color: #0fbcf9; }
        .completed { color: #05c46b; }

        /* WhatsApp Button */
        .whatsapp-btn {
            display: inline-block;
            margin-top: 25px;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            transition: 0.3s;
        }
        .whatsapp-btn:hover { background: #128c7e; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>Wasi Free Likes</h1>
    <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Enter link to get instant free likes</p>

    <div class="input-group">
        <label>Post Link</label>
        <input type="text" id="postLink" placeholder="Paste link here...">
    </div>
    
    <button class="btn-order" id="orderBtn" onclick="placeOrder()">Get Likes Now</button>
    <div id="msg" style="margin-top:10px; font-size:13px;"></div>

    <div class="tracking-card">
        <label>Track Order</label>
        <input type="text" id="orderIdInput" placeholder="Enter Order ID">
        <button class="btn-track" onclick="checkStatus()">Track Status</button>
        <div id="statusDisplay"></div>
    </div>

    <a href="https://chat.whatsapp.com/IbWWO9mim0rGCmVcA11CWI?mode=gi_t" target="_blank" class="whatsapp-btn">
        Join WhatsApp Group
    </a>
</div>

<script>
    async function placeOrder() {
        const link = document.getElementById('postLink').value;
        const msg = document.getElementById('msg');
        if(!link) return alert("Link dalain!");

        msg.innerText = "Processing...";
        
        const res = await fetch('/api/panel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'add', link: link })
        });
        const data = await res.json();
        
        if(data.order) {
            msg.innerHTML = `<span style="color:#05c46b">Success! ID: ${data.order}</span>`;
            document.getElementById('orderIdInput').value = data.order;
        } else {
            msg.innerHTML = `<span style="color:#ff3f34">Error: ${data.error || 'Failed'}</span>`;
        }
    }

    async function checkStatus() {
        const orderId = document.getElementById('orderIdInput').value;
        const display = document.getElementById('statusDisplay');
        if(!orderId) return alert("Order ID likhen");

        display.innerText = "...";

        const res = await fetch('/api/panel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'status', orderId: orderId })
        });
        const data = await res.json();
        
        let status = data.status || "Unknown";
        let colorClass = "";

        if(status === "Pending") colorClass = "pending";
        else if(status === "Processing" || status === "In progress") colorClass = "processing";
        else if(status === "Completed") colorClass = "completed";

        display.innerHTML = `Status: <span class="${colorClass}">${status}</span>`;
    }
</script>

</body>
  </html>
